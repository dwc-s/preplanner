{% extends "base.html" %}
{% block title %}Enter reset code · Pre-Planner{% endblock %}

{% block content %}
  <div class="auth-card">
    <h1>Set a new password</h1>
    <p class="subtle">Enter the code we emailed (valid 15 minutes) and choose a new password.</p>
    <form method="post" action="{{ url_for('auth.reset_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="field"><span>Email</span>
        <input type="email" name="email" value="{{ email|default('') }}" required></label>
      <label class="field"><span>Reset code</span>
        <input type="text" name="code" inputmode="numeric" autocomplete="one-time-code"
               placeholder="6-digit code" required></label>
      <label class="field"><span>New password</span>
        <input type="password" name="new_password" minlength="8" required></label>
      <label class="field"><span>Confirm new password</span>
        <input type="password" name="confirm_password" minlength="8" required></label>
      <button class="btn btn-primary" type="submit">Update password</button>
    </form>
    <p class="hint"><a href="{{ url_for('auth.forgot_password') }}">Request a new code</a>
      · <a href="{{ url_for('auth.login') }}">Sign in</a></p>
  </div>
{% endblock %}
