{% extends "base.html" %}
{% block title %}Reset password · Pre-Planner{% endblock %}

{% block content %}
  <div class="auth-card">
    <h1>Reset password</h1>
    <p class="subtle">Enter your email and we'll send you a code to reset your password.</p>
    <form method="post" action="{{ url_for('auth.forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="field"><span>Email</span>
        <input type="email" name="email" autofocus required></label>
      <button class="btn btn-primary" type="submit">Send reset code</button>
    </form>
    <p class="hint"><a href="{{ url_for('auth.login') }}">← Back to sign in</a></p>
  </div>
{% endblock %}
