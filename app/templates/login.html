{% extends "base.html" %}
{% block title %}Sign in · Pre-Planner{% endblock %}

{% block content %}
  <div class="auth-card">
    <h1>Sign in</h1>
    <p class="subtle">Fire-service pre-incident planning</p>
    <form method="post" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="field"><span>Email</span>
        <input type="email" name="email" autofocus required></label>
      <label class="field"><span>Password</span>
        <input type="password" name="password" required></label>
      <button class="btn btn-primary" type="submit">Sign in</button>
    </form>
    <p class="hint">Accounts are created by your department admin. No account? Ask them to add you.</p>
  </div>
{% endblock %}
