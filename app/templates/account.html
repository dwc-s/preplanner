{% extends "base.html" %}
{% block title %}Account · Pre-Planner{% endblock %}

{% block content %}
  <div class="page-head"><h1>Account</h1></div>

  <section class="card" style="max-width: 460px;">
    <h2>Change password</h2>
    <form method="post" action="{{ url_for('auth.account') }}"
          style="display: grid; gap: .8rem;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="field"><span>Current password</span>
        <input type="password" name="current_password" required></label>
      <label class="field"><span>New password</span>
        <input type="password" name="new_password" minlength="8" required></label>
      <label class="field"><span>Confirm new password</span>
        <input type="password" name="confirm_password" minlength="8" required></label>
      <div><button class="btn btn-primary" type="submit">Change password</button></div>
    </form>
    <p class="hint">Signed in as {{ current_user.email }} — {{ current_user.department.name }}
      ({{ current_user.role }}). Passwords must be at least 8 characters.</p>
  </section>
{% endblock %}
